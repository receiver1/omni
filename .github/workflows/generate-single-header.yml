name: Single-header Amalgamation

on:
  push:
    branches: [main]
    paths-ignore: ["**/*.md", "docs/**", "single_header/omni.hpp"]
  workflow_dispatch:

jobs:
  build:
    name: Amalgamate omni.hpp
    runs-on: windows-2025-vs2026
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install quom
        run: |
          python -m pip install --upgrade pip
          python -m pip install "quom==4.0.2"

      - name: Generate single-header
        run: |
          mkdir -p single_header
          quom "include/omni/omni.hpp" "single_header/omni.hpp" -I "include" -e utf-8-sig -t

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "single_header/omni.hpp"
          git diff --cached --quiet && exit 0
          git commit -m "chore(amalgamation): regenerate single-header omni.hpp"
          git push